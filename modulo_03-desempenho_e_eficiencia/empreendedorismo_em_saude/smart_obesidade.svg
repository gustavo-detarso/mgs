   <g id="text_1">
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'Liberation Sans'; text-anchor: middle" x="297.27" y="17.177422" transform="rotate(-0 297.27 17.177422)">Matriz SMART</text>
   </g>
   <g id="text_2">
    <text style="font-weight: 700; font-size: 18px; font-family: 'Liberation Sans'; text-anchor: middle; fill: #ffffff" x="42.347163" y="87.745688" transform="rotate(-0 42.347163 87.745688)">S</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 11.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="37.6365" transform="rotate(-0 66.290192 37.6365)">Específico</text>
   </g>
   <g id="text_4">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="52.333344" transform="rotate(-0 66.290192 52.333344)">• Linha de cuidado como porta de entrada estruturada e previsível (UAC → H. Brasília AC).</text>
   </g>
   <g id="text_5">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="73.003813" transform="rotate(-0 66.290192 73.003813)">• Gestão integral do percurso: captação, estratificação, documentação e encaminhamento.</text>
   </g>
   <g id="text_6">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="93.793813" transform="rotate(-0 66.290192 93.793813)">• Jornada do paciente com etapas claras, registros consistentes e monitoramento do funil.</text>
   </g>
   <g id="text_7">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="114.703344" transform="rotate(-0 66.290192 114.703344)">• Foco em cuidado longitudinal, sem lógica de pronto-atendimento, com resolutividade planejada.</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 18px; font-family: 'Liberation Sans'; text-anchor: middle; fill: #ffffff" x="42.347163" y="211.407688" transform="rotate(-0 42.347163 211.407688)">M</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 11.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="161.2005" transform="rotate(-0 66.290192 161.2005)">Mensurável</text>
   </g>
   <g id="text_10">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="175.875813" transform="rotate(-0 66.290192 175.875813)">• +40% pacientes moderada/grave identificados e acompanhados em linha (12 meses).</text>
   </g>
   <g id="text_11">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="196.665813" transform="rotate(-0 66.290192 196.665813)">• 85% adesão a consultas/retornos, com busca ativa e resgate de faltosos.</text>
   </g>
   <g id="text_12">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="217.575344" transform="rotate(-0 66.290192 217.575344)">• 100% triagem pré-bariátrica documentada em elegíveis (IMC ≥35+comorb./≥40).</text>
   </g>
   <g id="text_13">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="238.365344" transform="rotate(-0 66.290192 238.365344)">• Metas cirúrgicas condicionadas: 70% encaminhados (12m) e 60% cirurgia (18–24m).</text>
   </g>
   <g id="text_14">
    <text style="font-weight: 700; font-size: 18px; font-family: 'Liberation Sans'; text-anchor: middle; fill: #ffffff" x="42.347163" y="335.069688" transform="rotate(-0 42.347163 335.069688)">A</text>
   </g>
   <g id="text_15">
    <text style="font-weight: 700; font-size: 11.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="284.9605" transform="rotate(-0 66.290192 284.9605)">Atingível</text>
   </g>
   <g id="text_16">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="299.657344" transform="rotate(-0 66.290192 299.657344)">• Exequível por desenho operacional: captação por critério, triagem padronizada e governança.</text>
   </g>
   <g id="text_17">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="320.327813" transform="rotate(-0 66.290192 320.327813)">• Não depende de aumento indiscriminado de demanda; depende de organização e registro.</text>
   </g>
   <g id="text_18">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="341.237344" transform="rotate(-0 66.290192 341.237344)">• Conversão cirúrgica deliberadamente condicionada à pactuação e capacidade/regulação.</text>
   </g>
   <g id="text_19">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="362.027344" transform="rotate(-0 66.290192 362.027344)">• Posicionamento (porta de entrada confiável) independe de cirurgias imediatas.</text>
   </g>
   <g id="text_20">
    <text style="font-weight: 700; font-size: 18px; font-family: 'Liberation Sans'; text-anchor: middle; fill: #ffffff" x="42.347163" y="458.731688" transform="rotate(-0 42.347163 458.731688)">R</text>
   </g>
   <g id="text_21">
    <text style="font-weight: 700; font-size: 11.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="408.5245" transform="rotate(-0 66.290192 408.5245)">Relevante</text>
   </g>
   <g id="text_22">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="423.233281" transform="rotate(-0 66.290192 423.233281)">• Qualifica manejo de condição crônica: reduz variabilidade, atrasos e peregrinação do paciente.</text>
   </g>
   <g id="text_23">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="444.109344" transform="rotate(-0 66.290192 444.109344)">• Consolida a UAC como referência regional baseada em método e previsibilidade.</text>
   </g>
   <g id="text_24">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="464.899344" transform="rotate(-0 66.290192 464.899344)">• Gera demanda clínica/exames/procedimentos de forma qualificada para a rede parceira.</text>
   </g>
   <g id="text_25">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="485.569813" transform="rotate(-0 66.290192 485.569813)">• Sustenta ética assistencial e rastreabilidade da decisão clínica.</text>
   </g>
   <g id="text_26">
    <text style="font-weight: 700; font-size: 18px; font-family: 'Liberation Sans'; text-anchor: middle; fill: #ffffff" x="42.347163" y="582.393688" transform="rotate(-0 42.347163 582.393688)">T</text>
   </g>
   <g id="text_27">
    <text style="font-weight: 700; font-size: 11.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="532.1865" transform="rotate(-0 66.290192 532.1865)">Temporal</text>
   </g>
   <g id="text_28">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="546.981344" transform="rotate(-0 66.290192 546.981344)">• Até 30 dias: equipe capacitada e protocolo/checklist validados.</text>
   </g>
   <g id="text_29">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="567.771344" transform="rotate(-0 66.290192 567.771344)">• Até 90 dias: fluxo completo implantado e painel mínimo com primeiros relatórios.</text>
   </g>
   <g id="text_30">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="588.561344" transform="rotate(-0 66.290192 588.561344)">• 6º mês: revisão por dados, ajustes operacionais e avaliação do funil clínico-cirúrgico.</text>
   </g>
   <g id="text_31">
    <text style="font-size: 10.2px; font-family: 'Liberation Sans'; text-anchor: start" x="66.290192" y="609.351344" transform="rotate(-0 66.290192 609.351344)">• 12º mês: avaliação global e atualização de metas; maturação cirúrgica em 18–24 meses.</text>
   </g>
  </g>
 </g>
